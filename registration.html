<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div id="menu-container"></div>
    </header>

    <div class="container-auth">
      <form id="register-form" class="reg">
        <h3>Регистрация</h3>
        <div class="mb-3">
          <label class="form-label">ФИО</label>
          <input
            type="text"
            id="reg-name"
            class="form-control"
            placeholder="Иванов Иван Иванович"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="reg-email"
            class="form-control"
            placeholder="ivan@example.com"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Возраст</label>
          <input
            type="number"
            id="reg-age"
            class="form-control"
            min="18"
            max="100"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Номер телефона</label>
          <input
            type="text"
            id="reg-phone"
            class="form-control"
            placeholder="+7 (999) 000-00-00"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Пароль</label>
          <input
            type="password"
            id="reg-password"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Повторите пароль</label>
          <input
            type="password"
            id="reg-password2"
            class="form-control"
            required
          />
          <div class="form-text">Мы не передаем ваши данные третьим лицам.</div>
        </div>
        <button type="submit" class="btn-primary">Зарегистрироваться</button>
        <div style="margin-top: 15px; text-align: center">
          <span class="small-text">Уже есть аккаунт?</span> <br />
          <a href="auth.html" style="color: #333; font-weight: bold">Войти</a>
        </div>
      </form>
    </div>

    <footer>
      <p>
        Алтайский край, с. Рогозиха, ул. Братьев Долговых, д. 1А <br />
        +7 (960) 966-71-04
      </p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
