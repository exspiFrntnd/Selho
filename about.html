      <div class="about-lines">
        <div class="about-line">
          <div class="about-text">
            <div class="expand-wrapper">
              <p
                class="expand-text"
                data-short="Рецепты, рожденные на Алтае. Наши сыры ручной работы — это не просто еда, а настоящая история любви к своему делу. Каждую головку сыра мы создаём без спешки, вкладывая душу и тепло своих рук. Мы используем только собственное домашнее козье молоко высшего качества."
                data-full="Рецепты, рожденные на Алтае. Наши сыры ручной работы — это не просто еда, а настоящая история любви к своему делу. Каждую головку сыра мы создаём без спешки, вкладывая душу и тепло своих рук. Мы используем только собственное домашнее козье молоко высшего качества. В наших сырах вы никогда не найдете консервантов, стабилизаторов, загустителей и искусственных красителей. Вообще ничего лишнего. Только самые натуральные ингредиенты, наша безграничная любовь к своему ремеслу и, конечно, терпение, ведь настоящий сыр не терпит суеты. Попробовав наш сыр всего один раз, вы запомните этот яркий, чистый вкус навсегда. Вы сможете отличить его от любого магазинного аналога даже с закрытыми глазами."
              >
                <span class="text-content"></span>
              </p>
              <span class="expand-link">▼ Читать дальше</span>
            </div>
          </div>
          <div class="about-image">
            <img src="img/about1.jpg" alt="Ферма" />
          </div>
        </div>

        <div class="about-line">
          <div class="about-text">
            <div class="expand-wrapper">
              <p
                class="expand-text"
                data-short="Но сырами наше производство не ограничивается! Мы с той же трепетной заботой создаём йогурты и другие молочные продукты, которые становятся настоящим ритуалом доброго утра. Наши йогурты — это не магазинный «десерт» с длинным составом, а живой продукт."
                data-full="Но сырами наше производство не ограничивается! Мы с той же трепетной заботой создаём йогурты и другие молочные продукты, которые становятся настоящим ритуалом доброго утра. Наши йогурты — это не магазинный «десерт» с длинным составом, а живой продукт. Мы не добавляем искусственных ароматизаторов или сахарозаменителей. Только натуральные закваски, которые дарят йогурту нежную, бархатистую текстуру и чистый сливочный вкус, знакомый с детства. Это идеальный завтрак для всей семьи: полезный, сытный и безопасный даже для самых маленьких. Он даёт энергию на целый день, не нагружая желудок. Начните своё утро с нас — и вы почувствуете разницу между «просто едой» и настоящей заботой о близких."
              >
                <span class="text-content"></span>
              </p>
              <span class="expand-link">▼ Читать дальше</span>
            </div>
          </div>
          <div class="about-image">
            <img src="img/about3.jpg" alt="Козы" />
          </div>
        </div>

        <div class="about-line">
          <div class="about-text">
            <div class="expand-wrapper">
              <p
                class="expand-text"
                data-short="Птица, козлятина и крольчатина с нашей фермы — это совершенно иной уровень вкуса, чем вы привыкли видеть на полках магазинов. Наши животные не сидят в тесных клетках — они целый день проводят на просторе, много двигаются, дышат чистым воздухом и пасутся на лугах."
                data-full="Птица, козлятина и крольчатина с нашей фермы — это совершенно иной уровень вкуса, чем вы привыкли видеть на полках магазинов. Наши животные не сидят в тесных клетках — они целый день проводят на просторе, много двигаются, дышат чистым воздухом и пасутся на лугах. Никаких гормонов роста, никаких кормовых добавок сомнительного происхождения. Только чистая природа и ежедневный уход. Именно такой образ жизни делает мясо невероятно мягким, сочным и ароматным, без специфического запаха, который часто отпугивает от покупной козлятины или кролика. Из нашего мяса получается идеальный шашлык — он не становится жёстким даже на углях, наваристый золотистый бульон с насыщенным вкусом и домашняя тушёнка, которая тает во рту. Мы ценим ваше время и предпочтения, поэтому разделываем тушу строго под ваш заказ: вы можете получить её целиком, разрубленную на крупные куски для казана, на аккуратные стейки или в виде фарша для котлет. Достаточно позвонить нам заранее — и мы подготовим заказ к определённому часу. Вы сможете забрать мясо лично, приехав на ферму, или заказать доставку с комфортом. Попробовав наше мясо один раз, вы больше не захотите покупать мясные полуфабрикаты в супермаркете — разница слишком очевидна."
              >
                <span class="text-content"></span>
              </p>
              <span class="expand-link">▼ Читать дальше</span>
            </div>
          </div>
          <div class="about-image">
            <img src="img/about2.jpg" alt="Овцы" />
          </div>
        </div>

        <div class="about-line">
          <div class="about-text">
            <div class="expand-wrapper">
              <p
                class="expand-text"
                data-short="Наши принципы содержания животных — это честность перед природой и перед вами. Мы убеждены, что качество мяса и молока начинается с качества жизни самого животного. Именно поэтому наша ферма работает по системе свободного выпаса с ранней весны до поздней осени."
                data-full="Наши принципы содержания животных — это честность перед природой и перед вами. Мы убеждены, что качество мяса и молока начинается с качества жизни самого животного. Именно поэтому наша ферма работает по системе свободного выпаса с ранней весны до поздней осени. В тёплое время года стадо проводит на пастбищах по 8–10 часов в день, постоянно двигаясь, общаясь, выбирая самые сочные травы. Зимой, конечно, животные находятся в тёплых помещениях с мягкой соломенной подстилкой. Рацион у наших подопечных полностью натуральный и сбалансированный. Мы сами заготавливаем сено и составляем меню для каждого вида животных отдельно. И знаете, зачем мы так стараемся? Потому что стресс, голод, страх и болезни меняют химический состав мяса и молока — они становятся жёсткими, кислыми или приобретают неприятный привкус. А мы хотим, чтобы вы чувствовали только радость от нашей еды. Каждый стейк, каждый стакан молока, каждая баночка йогурта — это отражение спокойной, сытой и здоровой жизни наших подопечных. Мы гордимся тем, что можем назвать себя не просто производителями, а хранителями настоящего деревенского уклада, где человек и животное существуют в гармонии."
              >
                <span class="text-content"></span>
              </p>
              <span class="expand-link">▼ Читать дальше</span>
            </div>
          </div>

        </div>

        <div class="about-line">

                class="expand-text"

                data-full="А ещё у нас есть четвероногие помощники. Они ходят со мной в стадо каждое утро и вечер. Без них пасти было бы тяжело! Самые главные помощники - Тюбик и Грозный. Днём они следят, чтобы никто не отбился, а ночью охраняют хозяйство. Гости сначала боятся их лая, а потом уходят, обнимаясь - они очень ласковые."
              >
