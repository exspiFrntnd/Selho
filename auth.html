<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div id="menu-container"></div>
    </header>

    <div class="container-auth">
      <form id="login-form" class="reg">
        <h3>Вход в систему</h3>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="login-email"
            class="form-control"
            placeholder="admin@example.com"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Пароль</label>
          <input
            type="password"
            id="login-password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn-primary">Войти</button>
        <div style="margin-top: 20px; text-align: center">
          <span class="small-text">Нет аккаунта?</span> <br />
          <a href="registration.html" style="color: #333; font-weight: bold"
            >Зарегистрироваться</a
          >
        </div>
      </form>
    </div>

    <footer>
      <p>
        г. Барнаул, ул. Братьев Долговых, д. 1А <br />
        +7 (960) 966-71-04
      </p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
